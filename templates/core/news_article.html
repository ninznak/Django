{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen pt-24 max-sm:pt-[8.5rem] pb-20">
    <div class="max-w-3xl mx-auto px-6">
        <a href="/news/" class="text-[#3d7a4f] hover:underline mb-8 inline-block" data-i18="news_back">← Back to News</a>
        
        <span class="tag-pill" data-i18="news_article_label">Article</span>
        
        <h1 class="font-display text-4xl md:text-5xl font-semibold mt-4" data-i18="news_article_title">Article Title</h1>
        
        <p class="text-gray-500 mt-4" data-i18="news_article_meta">March 14, 2026 · 8 min read</p>
        
        <div class="mt-8 aspect-video rounded-3xl overflow-hidden">
            <img src="{% static 'images/news/bas-relief-depth-1920x1200.png' %}" 
                 alt="Article Image" class="w-full h-full object-cover">
        </div>
        
        <div class="mt-8 prose max-w-none">
            <p class="text-gray-600 leading-relaxed" data-i18="news_article_placeholder">
                Article content goes here. This is a placeholder for the news article page.
            </p>
        </div>
    </div>
</div>
{% endblock %}
