{% extends "core/base.html" %}

{% block content %}
<section class="min-h-screen pt-24 max-sm:pt-[8.5rem] pb-20">
    <div class="max-w-md mx-auto px-6">
        <div class="card p-8">
            <h1 class="font-display text-2xl font-semibold mb-4">Сброс пароля</h1>
            <p class="text-sm mb-6" style="color: var(--muted);">Укажите email — мы отправим ссылку для установки нового пароля.</p>
            <form method="post" class="space-y-4">
                {% csrf_token %}
                {{ form.email.errors }}
                <label class="block text-sm font-medium mb-1" for="{{ form.email.id_for_label }}">Email</label>
                {{ form.email }}
                <button type="submit" class="btn-primary w-full justify-center">Отправить</button>
            </form>
            <p class="mt-6 text-center text-sm"><a href="{% url 'core:sign_up_login' %}" class="text-[#3d7a4f] font-semibold">← Вход</a></p>
        </div>
    </div>
</section>
{% endblock %}
