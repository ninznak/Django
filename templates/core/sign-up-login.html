{% extends 'core/base.html' %}

{% block content %}
<div class="min-h-screen pt-24 max-sm:pt-[8.5rem] pb-20">
    <div class="max-w-md mx-auto px-6">
        <div class="bg-white rounded-3xl p-8 border border-primary/10 shadow-xl">
            <h1 class="font-display text-3xl font-semibold text-center" data-i18="auth_welcome_back">Welcome Back</h1>
            <p class="text-gray-500 text-center mt-2" data-i18="auth_signin_account">Sign in to your account</p>
            
            <form class="mt-8 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" data-i18="auth_email_or_username">Email or Username</label>
                    <input type="text" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#3d7a4f]" data-i18-placeholder="auth_enter_email_or_username" placeholder="Enter your email or username">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" data-i18="auth_password">Password</label>
                    <input type="password" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#3d7a4f]" data-i18-placeholder="auth_enter_password" placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn-primary w-full justify-center" data-i18="auth_signin">Sign In</button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-500"><span data-i18="auth_no_account">Don't have an account?</span> <a href="#" class="text-[#3d7a4f] font-semibold" data-i18="auth_sign_up_link">Sign Up</a></p>
            </div>
            
            <div class="mt-8 pt-6 border-t border-gray-100">
                <p class="text-sm text-gray-500 text-center" data-i18="auth_or_continue">Or continue with</p>
                <div class="flex gap-4 mt-4">
                    <button class="flex-1 py-3 border border-gray-200 rounded-xl hover:bg-gray-50">
                        <span data-i18="auth_google">Google</span>
                    </button>
                    <button class="flex-1 py-3 border border-gray-200 rounded-xl hover:bg-gray-50">
                        <span data-i18="auth_github">GitHub</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
