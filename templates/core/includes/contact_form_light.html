{% comment %}Компактная форма для светлого фона (about). POST на текущую страницу с contact_form=1.{% endcomment %}
<form method="post" action="{{ contact_form_action }}" class="space-y-4 card p-6">
    {% csrf_token %}
    <input type="hidden" name="contact_form" value="1">
    <div class="grid sm:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" data-i18-label="form_contact_name">Имя</label>
            <input type="text" name="name" required maxlength="120" value="{{ contact_form.name.value|default:'' }}" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl" data-i18-placeholder="form_contact_name" placeholder="Имя">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" data-i18-label="form_contact_email">Email</label>
            <input type="email" name="email" required value="{{ contact_form.email.value|default:'' }}" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl" data-i18-placeholder="form_contact_email" placeholder="Email">
        </div>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" data-i18-label="form_contact_subject">Тема</label>
        <input type="text" name="subject" required maxlength="200" value="{{ contact_form.subject.value|default:'' }}" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl" data-i18-placeholder="form_contact_subject" placeholder="Тема">
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" data-i18-label="form_contact_message">Сообщение</label>
        <textarea name="message" required rows="4" maxlength="5000" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl resize-y" data-i18-placeholder="form_contact_message" placeholder="Сообщение">{{ contact_form.message.value|default:'' }}</textarea>
    </div>
    <button type="submit" class="btn-primary" data-i18="form_contact_send">Отправить</button>
</form>
